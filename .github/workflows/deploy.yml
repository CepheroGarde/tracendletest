name: Build and Deploy Obfuscated App

on:
  push:
    branches:
      - main  # Triggers automatically whenever you push code to the main branch

permissions:
  contents: write  # Allows the action to write compiled code to the gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull down your clean source code from the repository
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Set up Node.js environment on the GitHub runner
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Install the compilation and obfuscation dependencies
      - name: Install Dependencies
        run: npm install

      # 4. Run the compilation script from package.json
      # This compiles config, game, main, etc., into /dist/app.min.js and scrambles it
      - name: Bundle and Obfuscate JS
        run: npm run build

      # 5. Deploy the compiled static folder (/dist) directly to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Tells GitHub to serve your website straight from the protected 'dist' folder
          branch: gh-pages # The live website branch
